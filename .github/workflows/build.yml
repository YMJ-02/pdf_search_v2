name: Build & Release Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-backend:
    name: Build Python Backend (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build backend with PyInstaller
        run: |
          cd backend
          pyinstaller backend.spec

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-exe
          path: backend/dist/backend.exe

  build-electron:
    name: Build Electron App (Windows)
    runs-on: windows-latest
    needs: build-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Download backend exe
        uses: actions/download-artifact@v4
        with:
          name: backend-exe
          path: backend/dist/

      - name: Install root dependencies
        run: npm install

      - name: Install frontend dependencies & build
        run: |
          cd frontend
          npm install
          npm run build

      - name: Build Electron installer
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist_app/*.exe

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-electron
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: ./release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release/*.exe
          name: "PDF 검색 ${{ github.ref_name }}"
          body: |
            ## PDF 검색 데스크톱 앱 ${{ github.ref_name }}

            ### 설치 방법
            1. 아래 `PDF 검색 Setup.exe` 다운로드
            2. 더블클릭 → 다음 → 다음 → 설치 완료
            3. 바탕화면의 **PDF 검색** 아이콘 클릭

            > Python, Node.js 설치 불필요. 그냥 설치해서 바로 사용 가능.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
